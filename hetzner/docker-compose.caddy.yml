# Terminación TLS (Let's Encrypt). Podman: podman compose ...
# Requisitos: redes externas investplatform_internal (backend) y investplatform_search (crear antes: searxng README).
#
#   cd searxng && podman compose -p searxng -f podman-compose.yml --env-file .env.searxng up -d
#   cd ../../backend && podman compose up -d --build
#   cd ../hetzner && podman compose -f docker-compose.caddy.yml --env-file .env.caddy up -d
#
version: "3.9"

networks:
  investplatform_internal:
    external: true
  investplatform_search:
    external: true

services:
  caddy:
    image: docker.io/caddy:2-alpine
    container_name: body-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
      SEARCH_DOMAIN: ${SEARCH_DOMAIN:?set SEARCH_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - investplatform_internal
      - investplatform_search

volumes:
  caddy_data:
  caddy_config:
