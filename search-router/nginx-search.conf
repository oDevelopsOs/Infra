worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;

    upstream search_router_upstream {
        server search-router:8090;
        keepalive 64;
    }

    limit_req_zone $http_x_search_api_key zone=per_key:20m rate=500r/s;
    limit_req_zone $binary_remote_addr zone=per_ip:20m rate=100r/s;

    server {
        listen 8090;
        server_name _;

        location /health {
            proxy_pass http://search_router_upstream;
        }

        location /metrics {
            proxy_pass http://search_router_upstream;
        }

        location /search/query {
            limit_req zone=per_key burst=500 nodelay;
            limit_req zone=per_ip burst=120 nodelay;
            proxy_pass http://search_router_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 20s;
            proxy_read_timeout 20s;
        }
    }
}
