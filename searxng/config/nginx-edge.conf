# Nginx delante de SearXNG: cabeceras correctas para botdetection/limiter detrás de proxy.
# Backend/Oracle: SEARXNG_URL=http://<host>:8099 si usas edge, o http://<host>:8088 directo a SearXNG.
#
# Upstream = nombre del servicio en podman-compose.yml (searxng).

upstream searxng_upstream {
    server searxng:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;
    proxy_connect_timeout 90s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://searxng_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
